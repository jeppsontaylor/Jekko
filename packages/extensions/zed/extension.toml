args = ["acp"]

[agent_servers.jekko.targets.darwin-x86_64]
archive = "https://github.com/anomalyco/jekko/releases/download/v1.14.39/jekko-darwin-x64.zip"
cmd = "./jekko"
args = ["acp"]

[agent_servers.jekko.targets.linux-aarch64]
archive = "https://github.com/anomalyco/jekko/releases/download/v1.14.39/jekko-linux-arm64.tar.gz"
cmd = "./jekko"
args = ["acp"]

[agent_servers.jekko.targets.linux-x86_64]
archive = "https://github.com/anomalyco/jekko/releases/download/v1.14.39/jekko-linux-x64.tar.gz"
cmd = "./jekko"
args = ["acp"]

[agent_servers.jekko.targets.windows-x86_64]
