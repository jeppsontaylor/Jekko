id = "jekko"
name = "Jekko"
description = "The open source coding agent."
version = "1.14.39"
schema_version = 1
authors = ["Anomaly"]
repository = "https://github.com/anomalyco/jekko"

[agent_servers.jekko]
name = "Jekko"
icon = "./icons/jekko.svg"

[agent_servers.jekko.targets.darwin-aarch64]
