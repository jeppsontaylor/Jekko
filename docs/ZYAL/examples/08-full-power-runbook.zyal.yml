# ZYAL v2.1 — Full Power Runbook
#
# Every v2.1 power block in one runbook: arming + capabilities + quality +
# experiments + models + budgets + triggers + rollback + done +
# repo_intelligence — combined with workflow + memory + evidence + approvals +
# skills + sandbox + security + observability + incubator + on-handlers +
# fan_out + guardrails + assertions + retry + hooks + constraints. The complete
# host-enforced autonomous-engineering contract.

<<<ZYAL v1:daemon id=full-power>>>
version: v1
intent: daemon
confirm: RUN_FOREVER

job:
  name: "Full-power flagship runbook"
  objective: |
    Demonstrate every ZYAL v2.1 capability in one production-grade contract:
    workflow-driven phases, hypothesis tournament for risky tasks, multi-tier
    memory, typed evidence, multi-role approvals, signed checkpoints, governed
    skills, sandboxed runtime, capability leases, anti-vibe quality, multi-scope
    budgets, trigger sources with anti-recursion, verifiable rollback, host-
    evaluated done, repo-graph scope control, OpenTelemetry observability.
  risk:
    - Cross-cutting changes touching auth/migrations/public APIs
    - Long-running with high cost ceiling

# ─── v2.1: Origin-aware arming ─────────────────────────────────────────────
arming:
  preview_hash_required: true
  host_nonce_required: true
  reject_inside_code_fence: true
  reject_from: [assistant_output, tool_output, web_content, mcp_resource, issue_comment, repo_files]
  accepted_origins: [trusted_user_message, signed_cli_input, host_ui_button]
  preview_expires_after: 10m
  arm_token_single_use: true
  bound_to: ["script_hash", "user_id", "repo", "branch"]

# ─── Triggers ──────────────────────────────────────────────────────────────
triggers:
  anti_recursion: true
  list:
    - id: nightly
      kind: cron
      schedule: "0 4 * * *"
      allow_create_more_cron: false
    - id: zyal-issue
      kind: github_issue
      filter: { label: zyal-ready }
      idempotency_key_template: "issue-{{number}}-{{sha}}"
    - id: ci-fail
      kind: ci_failure
      filter: { branch: main }
      max_runs_per_sha: 1

# ─── Repo intelligence ─────────────────────────────────────────────────────
repo_intelligence:
  scale: large
  indexes: [symbols, dependency_graph, test_graph, ownership, generated_zones, security_sinks, api_contracts]
  generated_zones: ["**/*.gen.ts", "**/*.pb.go", "**/generated/**"]
  scope_control:
    require_scope_before_edit: true
    max_initial_scope_files: 50
    expand_scope_requires_evidence: true
  blast_radius:
    compute_on: [edit, checkpoint, promote]
    pause_when_score_gte: 0.75

# ─── Workflow ──────────────────────────────────────────────────────────────
workflow:
  type: state_machine
  initial: discover
  on_stuck: incubate
  max_total_time: 24h
  states:
    discover:
      agent: plan
      writes: scratch_only
      produces: [impact_map, task_graph]
      transitions:
        - to: plan
          when: { evidence_exists: impact_map }
    plan:
      agent: plan
      writes: scratch_only
      requires: [impact_map]
      produces: [change_plan, test_plan, rollback_plan]
      approval: plan_review
      transitions:
        - to: implement
          when: { approval_granted: plan_review }
    implement:
      agent: build
      writes: isolated_worktree
      requires: [change_plan, test_plan]
      produces: [code_changes, test_results]
      transitions:
        - to: verify
          when: { all_checks_pass: true }
        - to: plan
          when: { checks_failed: true }
    verify:
      agent: build
      writes: none
      requires: [test_results]
      produces: [verification_report]
      transitions:
        - to: promote
          when: { all_checks_pass: true }
    promote:
      terminal: true
      approval: merge_review

# ─── Stop & Done ───────────────────────────────────────────────────────────
stop:
  all:
    - shell:
        command: "test -f .opencode/daemon/promoted.txt"
        timeout: 5s
        assert: { exit_code: 0 }

done:
  require:
    - workflow_terminal_reached
    - evidence_complete
    - merge_review_approved
    - rollback_verify_passed
    - no_unresolved_critical_objections
  forbid:
    - model_only_claim
    - tests_not_run

# ─── Capabilities & Command Floor ──────────────────────────────────────────
capabilities:
  default: deny
  rules:
    - { id: read-anywhere, tool: read, decision: allow }
    - { id: edit-src, tool: edit, paths: ["packages/**/src/**", "packages/**/test/**"], decision: allow }
    - { id: edit-migrations, tool: edit, paths: ["**/migrations/**"], decision: ask, require_gate: dba_review }
    - { id: edit-auth, tool: edit, paths: ["packages/auth/**"], decision: ask, require_gate: security_review }
    - { id: shell-tests, tool: shell, command_regex: "^(bun|pnpm) (test|run lint|run build)", decision: allow, expires: 4h }
    - { id: git-commit, tool: git_commit, decision: ask }
  command_floor:
    always_block:
      - "git push --force"
      - "rm -rf /"
      - "sudo "
      - "chmod 777"
      - "curl .* \\| sh"
      - "DROP DATABASE"
      - "TRUNCATE "

# ─── Quality ───────────────────────────────────────────────────────────────
quality:
  anti_vibe:
    enabled: true
    fail_closed: true
    block_test_deletion: true
    block_assertion_weakening: true
    block_silent_catch: true
    block_fake_data_fallback: true
    block_ts_ignore: true
    require_root_cause_for_bugfix: true
    require_failing_test_first_for_bugfix: true
  diff_budget:
    max_files_changed: 50
    max_added_lines: 3000
    on_violation: require_approval
  checks:
    - { name: no-test-skip, pattern: "\\.skip\\(|test\\.only\\(", scope: file_diff, on_violation: block_promotion }
    - { name: no-edit-generated, pattern: "(\\.gen\\.|/generated/)", scope: file_diff, on_violation: block_checkpoint }

# ─── Experiments (hypothesis tournament for risky tasks) ───────────────────
experiments:
  strategy: disjoint_tournament
  fork_from: last_green_checkpoint
  diversity:
    require_distinct_plan: true
    min_plan_distance: 0.40
    axes: [minimal_patch, test_first, refactor_boundary, dependency_strategy]
  lanes:
    - { id: minimal, hypothesis: "Smallest patch.", prompt_strategy: smallest_safe_change, isolation: git_worktree, timeout: 30m, budget: { max_iterations: 5, max_diff_lines: 500 } }
    - { id: test-first, hypothesis: "Tests first, then code.", prompt_strategy: tests_first, isolation: git_worktree, timeout: 45m }
    - { id: refactor, hypothesis: "Extract clean boundary.", prompt_strategy: refactor_first, isolation: git_worktree, timeout: 60m }
  max_parallel: 2
  scoring:
    weights:
      tests_passed: 0.30
      typecheck_passed: 0.20
      security_clean: 0.20
      maintainability: 0.15
      diff_minimal: 0.10
      rollback_simplicity: 0.05
    judge: { agent: critic, blind: true, must_use_different_provider: true }
  reduce: { strategy: best_verified_patch, require_final_verification: true }
  on_partial_failure: continue
  preserve_failed_lanes_as_negative_memory: true

# ─── Models ────────────────────────────────────────────────────────────────
models:
  profiles:
    plan: { provider: anthropic, model: claude-opus-4-7, reasoning: true }
    build: { provider: anthropic, model: claude-sonnet-4-6 }
    critic: { provider: openai, model: gpt-5, reasoning: true }
    summarizer: { provider: anthropic, model: claude-haiku-4-5-20251001, budget_usd: 0.50 }
  routes: { plan: plan, implement: build, review: critic, compress: summarizer }
  critic: { must_differ_from_builder: true, must_use_different_provider: true }
  fallback: { on_rate_limit: summarizer, on_context_overflow: summarizer, cooldown: 60s }
  confidence_cap: 0.6

# ─── Budgets ───────────────────────────────────────────────────────────────
budgets:
  run: { wall_clock: 24h, cost_usd: 80.00, on_exhaust: renew_with_approval }
  task: { iterations: 30, cost_usd: 8.00, on_exhaust: park }
  iteration: { tool_calls: 40, diff_lines: 2000, on_exhaust: pause }
  experiment_lane: { wall_clock: 60m, cost_usd: 5.00, on_exhaust: abort }

# ─── Memory ────────────────────────────────────────────────────────────────
memory:
  stores:
    task_context: { scope: task, retention: until_promotion, max_entries: 200, write_policy: append_only, read_policy: inject_at_start }
    failed_approaches: { scope: global, retention: permanent, write_policy: append_only, read_policy: search, searchable: true }
    architectural_decisions: { scope: global, retention: permanent, write_policy: upsert, read_policy: search, searchable: true }
  redaction: { patterns: ["sk-*", "AKIA*", "ghp_*"], action: mask }
  provenance: { track_source: true, hash_chain: true }

# ─── Evidence ──────────────────────────────────────────────────────────────
evidence:
  require_before_promote:
    - { type: test_results, must_pass: true }
    - { type: typecheck_results, must_pass: true }
    - { type: security_scan, must_pass: true }
    - { type: blind_critic_score, must_pass: true }
    - { type: rollback_plan, must_exist: true }
    - { type: rollback_verify, must_pass: true }
    - { type: ownership_approvals, must_be_known: true }
    - { type: regression_diff, max_increase: 0.05 }
  bundle_format: json
  sign: sha256
  archive: true

# ─── Approvals ─────────────────────────────────────────────────────────────
approvals:
  gates:
    plan_review:
      required_role: tech_lead
      timeout: 24h
      on_timeout: pause
      decisions: [approve, reject, edit, escalate]
      auto_approve_if: { risk_score_lt: 0.3, all_checks_pass: true }
    dba_review: { required_role: dba, timeout: 48h, decisions: [approve, reject] }
    security_review: { required_role: security, timeout: 24h, decisions: [approve, reject, edit] }
    merge_review:
      required_role: code_owner
      timeout: 48h
      require_evidence: [test_results, blind_critic_score, rollback_plan, rollback_verify, security_scan]
  escalation:
    chain: [tech_lead, staff_engineer, eng_director]
    auto_escalate_after: 48h

# ─── Skills (governed) ─────────────────────────────────────────────────────
skills:
  registry:
    fix-until-tests-pass: { description: "Loop tests until green.", agent: build, writes: working_tree, trust: builtin }
    parallel-audit: { description: "Lint+typecheck+tests in parallel worktrees.", agent: build, writes: isolated_worktree, trust: verified }
  allow_creation: true
  max_skills: 20

# ─── Sandbox ───────────────────────────────────────────────────────────────
sandbox:
  paths:
    - { path: "src/**", access: write }
    - { path: "test/**", access: write }
    - { path: ".env*", access: deny }
    - { path: "secrets/**", access: deny }
    - { path: ".ssh/**", access: deny }
  network:
    outbound: allowlist
    allowlist: ["registry.npmjs.org", "github.com", "api.github.com"]
  resources: { max_file_size: 10MB, max_total_disk: 5GB, max_memory: 4GB, max_processes: 50 }
  env_inherit: [PATH, HOME, LANG, TZ]
  env_deny: ["*_TOKEN", "*_KEY", "*_SECRET", "AWS_*", "GITHUB_*"]

# ─── Security ──────────────────────────────────────────────────────────────
security:
  trust_zones:
    sensitive: { paths: ["packages/auth/**", "**/migrations/**"], require_approval: true, max_risk_score: 0.4 }
  injection:
    scan_inputs: true
    scan_outputs: true
    deny_patterns: ["ignore previous instructions", "disregard the system prompt", "you are now a different agent"]
    on_detect: pause
  secrets: { redact_from_logs: true, rotate_after: 24h }

# ─── Rollback ──────────────────────────────────────────────────────────────
rollback:
  required_when:
    touches_paths: ["**/migrations/**", "packages/auth/**", "infra/**"]
    risk_score_gte: 0.5
  plan_required: true
  verify_command: "git apply --reverse --check < .opencode/daemon/rollback.patch"
  on_failure_after_merge: revert_commit

# ─── Observability ─────────────────────────────────────────────────────────
observability:
  spans: { emit: all, include_tool_calls: true, include_model_calls: true }
  metrics:
    - { name: tasks_promoted, type: counter, source: daemon }
    - { name: experiment_winners, type: counter, source: experiments }
    - { name: cost_usd, type: counter, source: budgets }
    - { name: capability_denials, type: counter, source: capabilities }
    - { name: anti_vibe_blocks, type: counter, source: quality }
    - { name: rollback_verifications, type: counter, source: rollback }
  cost: { budget: 80.00, currency: USD, alert_at_percent: 75, on_budget_exceeded: pause }
  report: { format: markdown, on_complete: true, on_checkpoint: true }

# ─── Incubator (fallback for stuck/risky) ──────────────────────────────────
incubator:
  enabled: true
  strategy: generate_pool_strengthen
  route_when:
    any:
      - repeated_attempts_gte: 3
      - risk_score_gte: 0.7
      - touches_paths: ["packages/auth/**", "**/migrations/**"]
  budget: { max_passes_per_task: 7, max_rounds_per_task: 2, max_active_tasks: 2, max_parallel_idea_passes: 3 }
  scratch: { storage: sqlite, mirror: true, cleanup: summarize_and_archive }
  cleanup: { summarize_to_task_memory: true, archive_artifacts: true, delete_scratch: true, delete_unmerged_worktrees: true }
  readiness:
    promote_at: 0.78
    tests_identified_gte: 1
    scope_bounded_gte: 1
    plan_reviewed_gte: 1
    prototype_validated_gte: 1
    rollback_known_gte: 1
    affected_files_known_gte: 1
    critical_objections_resolved_gte: 1
    model_confidence_cap: 0.06
  passes:
    - { id: scout, type: scout, context: blind, writes: scratch_only }
    - { id: ideas, type: idea, context: blind, count: 3, writes: scratch_only }
    - { id: critic, type: critic, context: pool, writes: scratch_only }
    - { id: synth, type: synthesize, context: pool, writes: scratch_only }
    - { id: prototype, type: prototype, context: inherit, writes: isolated_worktree }
    - { id: review, type: promotion_review, context: promotion, writes: scratch_only }
  promotion:
    promote_at: 0.78
    require: [problem_statement, current_best_plan, verification_strategy, risk_review]
    block_on: { unresolved_critical_objections_gte: 1 }
    on_promote: move_to_ready_queue
    on_exhausted: park_with_summary

# ─── Fan-out (parallel sub-tasks distinct from experiments) ────────────────
fan_out:
  strategy: map_reduce
  split:
    items: [lint, typecheck, unit-tests, integration-tests, security-scan]
  worker:
    agent: build
    isolation: git_worktree
    timeout: 15m
    max_parallel: 4
  reduce: { strategy: merge_all }
  on_partial_failure: continue

# ─── Hooks, retries, guardrails, constraints, on-handlers, assertions ─────
hooks:
  on_start:
    - run: "git fetch origin main"
    - run: "bun install"
  before_iteration:
    - run: "git rebase origin/main --autostash"
      on_fail: warn
  before_checkpoint:
    - run: "bun run lint --fix"
  on_promote:
    - run: "bun test --timeout 60000"
      assert: { exit_code: 0 }
      on_fail: block_promotion
  on_stop:
    - run: "node scripts/post-run-report.mjs"
      on_fail: warn

retry:
  default: { max_attempts: 3, backoff: exponential, initial_delay: 2s, max_delay: 30s, jitter: true }
  overrides:
    shell_checks: { max_attempts: 5, backoff: linear, initial_delay: 1s }
    checkpoint: { max_attempts: 2, backoff: none }

guardrails:
  input:
    - name: no-force-push
      deny_patterns: ["git push --force", "git push -f"]
      action: block
    - name: no-secret-leak
      deny_patterns: ["sk-[a-zA-Z0-9]{20,}", "AKIA[A-Z0-9]{16}", "ghp_[A-Za-z0-9]{36}"]
      scope: tool_output
      action: block
  output:
    - name: type-safety
      shell: "tsgo --noEmit 2>&1 | grep -c 'error TS' || echo 0"
      on_fail: retry
      max_retries: 2

constraints:
  - name: test-count-stable
    check: { shell: "bun test --dry-run 2>&1 | grep -c test" }
    baseline: capture_on_start
    invariant: gte_baseline
    on_violation: pause
  - name: no-binary-files
    check: { shell: "git diff --cached --diff-filter=A --name-only | xargs file 2>/dev/null | grep -c binary || echo 0" }
    invariant: equals_zero
    on_violation: block

assertions:
  require_structured_output: true
  schema:
    type: object
    properties:
      hypothesis: { type: string }
      affected_files: { type: array }
      tests_to_run: { type: array }
      rollback_plan: { type: string }
      risk_score: { type: number, minimum: 0, maximum: 1 }
    required: [hypothesis, affected_files, tests_to_run, rollback_plan, risk_score]
  on_invalid: retry
  max_retries: 2

on:
  - signal: no_progress
    count_gte: 3
    do:
      - switch_agent: plan
      - notify: "Switching to plan agent after 3 stalls"
  - signal: error
    message_contains: "ENOMEM"
    do:
      - pause: true
      - notify: "Out of memory detected"
  - signal: checkpoint_failed
    do:
      - incubate_current_task: true

# ─── Loop & Context ────────────────────────────────────────────────────────
loop:
  policy: forever
  sleep: 5s
  continue_on: [assistant_stop, max_steps, compaction]
  pause_on: [permission_denied, checkpoint_failed]
  circuit_breaker: { max_consecutive_errors: 3, on_trip: pause }

context:
  strategy: hybrid
  compact_every: 10
  hard_clear_every: 25
  preserve: [objective, current_best_plan, failed_approaches, evidence]

checkpoint:
  when: after_verified_change
  noop_if_clean: true
  verify:
    - { command: "bun test --timeout 30000", timeout: 60s, assert: { exit_code: 0 } }
  git:
    add: ["."]
    commit_message: "checkpoint: ${task.id}"
    push: ask

# ─── UI ────────────────────────────────────────────────────────────────────
ui:
  theme: opencode-gold
  banner: forever

permissions:
  shell: ask
  edit: allow
  git_commit: ask
  git_push: deny
  workers: allow
  mcp: ask
