# ZYAL v2.1 — Fix Until Green
#
# A disciplined bug-fix daemon. No vibe-coding: a failing reproduction is required
# before any production patch. Anti-vibe gates block test deletion, assertion
# weakening, silent catches, and TS-ignore. Diff budgets cap blast radius.
# Capability leases force shell allow-listing. Done is host-evaluated, not a
# model self-claim.

<<<ZYAL v1:daemon id=fix-until-green>>>
version: v1
intent: daemon
confirm: RUN_FOREVER

job:
  name: "Bug-fix discipline daemon"
  objective: |
    Fix failing tests on this branch with a real reproduction, a minimal patch,
    a verifiable rollback, and zero vibe-coding shortcuts.
  risk:
    - Patch could mask root cause if tests are weakened
    - Migration zone touched without DBA review

arming:
  preview_hash_required: true
  host_nonce_required: true
  reject_inside_code_fence: true
  reject_from: [assistant_output, tool_output, web_content, mcp_resource, issue_comment]
  accepted_origins: [trusted_user_message, host_ui_button, signed_cli_input]
  preview_expires_after: 10m
  arm_token_single_use: true
  bound_to: ["script_hash", "user_id", "repo", "branch"]

loop:
  policy: forever
  sleep: 5s
  pause_on: [permission_denied, checkpoint_failed, no_progress]
  circuit_breaker:
    max_consecutive_errors: 3
    on_trip: pause

stop:
  all:
    - shell:
        command: "bun test --timeout 30000 && bun run lint && tsgo --noEmit"
        timeout: 180s
        assert: { exit_code: 0 }
    - git_clean: { allow_untracked: false }

quality:
  anti_vibe:
    enabled: true
    fail_closed: true
    block_test_deletion: true
    block_assertion_weakening: true
    block_silent_catch: true
    block_fake_data_fallback: true
    block_ts_ignore: true
    require_root_cause_for_bugfix: true
    require_failing_test_first_for_bugfix: true
  diff_budget:
    max_files_changed: 15
    max_added_lines: 800
    on_violation: require_approval
  checks:
    - name: no-test-skip
      pattern: "\\.skip\\(|test\\.only\\(|describe\\.only\\("
      scope: file_diff
      on_violation: block_promotion
    - name: no-broad-catch
      pattern: "catch\\s*\\([^)]*\\)\\s*\\{\\s*\\}"
      scope: file_diff
      on_violation: warn

capabilities:
  default: deny
  rules:
    - id: read-anywhere
      tool: read
      decision: allow
    - id: edit-src-and-tests
      tool: edit
      paths: ["packages/opencode/src/**", "packages/opencode/test/**"]
      decision: allow
    - id: edit-migrations-blocked
      tool: edit
      paths: ["packages/opencode/migration/**"]
      decision: ask
      require_gate: dba_review
      reason: schema-sensitive
    - id: shell-tests
      tool: shell
      command_regex: "^(bun (test|run lint)|tsgo --noEmit|git (status|diff))"
      decision: allow
      expires: 4h
    - id: git-commit
      tool: git_commit
      decision: ask
  command_floor:
    always_block:
      - "git push --force"
      - "rm -rf /"
      - "sudo "
      - "DROP DATABASE"

models:
  profiles:
    builder:
      provider: anthropic
      model: claude-sonnet-4-6
    critic:
      provider: openai
      model: gpt-5
      reasoning: true
    summarizer:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      budget_usd: 0.50
  routes:
    plan: builder
    implement: builder
    review: critic
    compress: summarizer
  critic:
    must_differ_from_builder: true
    must_use_different_provider: true
  fallback:
    on_rate_limit: summarizer
    on_context_overflow: summarizer
    cooldown: 60s
  confidence_cap: 0.6

budgets:
  run:
    wall_clock: 4h
    cost_usd: 20.00
    on_exhaust: pause
  task:
    iterations: 20
    cost_usd: 3.00
    on_exhaust: park
  iteration:
    tool_calls: 30
    diff_lines: 800
    on_exhaust: pause

rollback:
  required_when:
    touches_paths:
      - "packages/opencode/migration/**"
      - "packages/opencode/src/auth/**"
    risk_score_gte: 0.6
  plan_required: true
  verify_command: "git apply --reverse --check < .opencode/daemon/rollback.patch"
  on_failure_after_merge: revert_commit

approvals:
  gates:
    dba_review:
      required_role: dba
      timeout: 24h
      on_timeout: pause
      decisions: [approve, reject, edit]

checkpoint:
  when: after_verified_change
  noop_if_clean: true
  verify:
    - command: "bun test --timeout 30000"
      timeout: 60s
      assert: { exit_code: 0 }
  git:
    add: ["."]
    commit_message: "fix: ${task.id} — ${task.summary}"
    push: ask

done:
  require:
    - stop_conditions_met
    - requirements_verified
    - evidence_complete
    - no_unresolved_critical_objections
    - rollback_plan_recorded
    - final_state_clean
  forbid:
    - model_only_claim
    - tests_not_run
    - pending_human_gate

ui:
  theme: opencode-gold
  banner: forever

permissions:
  shell: ask
  edit: allow
  git_commit: ask
  git_push: deny
<<<END_ZYAL id=fix-until-green>>>
ZYAL_ARM RUN_FOREVER id=fix-until-green
