<<<ZYAL v1:daemon id=jankurai-master-loop>>>
version: v1
intent: daemon
confirm: RUN_FOREVER

job:
  name: "Jankurai master loop"
  objective: |
    Run forever: audit with jankurai, harvest new work into JANKURAI_TASKLIST.md,
    rotate completed items into JANKURAI_TASKLIST.md.completed, claim one task,
    route trivial tasks to direct execution and risky tasks to the multi-pass
    incubator, commit and push every verified change, hard-clear context between
    tasks. Stop only when jankurai reports zero issues, the worktree is clean,
    and HEAD is fully pushed to origin/main.
  risk:
    - Long-running with autonomous git_commit; bounded by per-iteration verify
    - Touches arbitrary files; bounded by capability rules and anti-vibe gates

arming:
  preview_hash_required: true
  host_nonce_required: true
  reject_inside_code_fence: true
  reject_from: [assistant_output, tool_output, web_content, mcp_resource, issue_comment, repo_files]
  accepted_origins: [trusted_user_message, signed_cli_input, host_ui_button]
  preview_expires_after: 10m
  arm_token_single_use: true
  bound_to: ["script_hash", "user_id", "repo", "branch"]

fleet:
  max_workers: 20
  isolation: same_session
  jnoccio:
    enabled: true
    base_url: "http://127.0.0.1:4317"
    metrics_ws: "/v1/jnoccio/metrics/ws"
    spawn_on_demand: true
    register_workers: true
    heartbeat_path: "/v1/jnoccio/agents/heartbeat"
    heartbeat_interval: 30s
  telemetry:
    publish_to: jnoccio
    headers:
      x-opencode-run-id: "${run.id}"
      x-opencode-session: "${session.id}"
      x-opencode-process-role: worker

loop:
  policy: forever
  sleep: 5s
  continue_on: [assistant_stop, max_steps, compaction]
  pause_on: [permission_denied, checkpoint_failed]
  circuit_breaker:
    max_consecutive_errors: 3
    on_trip: pause

context:
  strategy: hard
  compact_every: 1
  hard_clear_every: 1
  preserve:
    - objective
    - current_task_id
    - failed_approaches
    - jankurai_findings_count
    - rollback_plan

stop:
  all:
    - shell:
        command: "jankurai audit --json 2>/dev/null | jq -e '.findings | length == 0'"
        timeout: 120s
        assert: { exit_code: 0 }
    - git_clean: { allow_untracked: false }
    - shell:
        command: "git fetch -q origin && [ -z \"$(git log origin/main..HEAD --oneline)\" ]"
        timeout: 30s
        assert: { exit_code: 0 }

hooks:
  on_start:
    - run: "git fetch -q origin"
    - run: "mkdir -p .opencode/daemon && touch JANKURAI_TASKLIST.md JANKURAI_TASKLIST.md.completed"
    - run: |
        if grep -q '^- \[x\]' JANKURAI_TASKLIST.md 2>/dev/null; then
          { echo ""; echo "## Rotated $(date -u +%Y-%m-%dT%H:%M:%SZ)"; grep '^- \[x\]' JANKURAI_TASKLIST.md; } >> JANKURAI_TASKLIST.md.completed
          sed -i.bak '/^- \[x\]/d' JANKURAI_TASKLIST.md && rm -f JANKURAI_TASKLIST.md.bak
        fi
      on_fail: warn
  before_iteration:
    - run: "git rebase origin/main --autostash"
      on_fail: warn
    - run: |
        jankurai audit --json > .opencode/daemon/jankurai-latest.json 2>/dev/null || echo '{"findings":[]}' > .opencode/daemon/jankurai-latest.json
        jq -r '.findings[] | "- [ ] " + .id + " — " + .title + " (" + (.severity // "med") + ", " + (.file // "?") + ")"' .opencode/daemon/jankurai-latest.json > .opencode/daemon/jankurai-new.txt || true
        if [ -s .opencode/daemon/jankurai-new.txt ]; then
          grep -F -v -f <(grep -oE '\b[A-Z]+-[0-9]+' JANKURAI_TASKLIST.md 2>/dev/null | sort -u || true) .opencode/daemon/jankurai-new.txt >> JANKURAI_TASKLIST.md || true
        fi
      on_fail: warn
    - run: |
        if grep -q '^- \[x\]' JANKURAI_TASKLIST.md; then
          { echo ""; echo "## Rotated $(date -u +%Y-%m-%dT%H:%M:%SZ)"; grep '^- \[x\]' JANKURAI_TASKLIST.md; } >> JANKURAI_TASKLIST.md.completed
          sed -i.bak '/^- \[x\]/d' JANKURAI_TASKLIST.md && rm -f JANKURAI_TASKLIST.md.bak
        fi
      on_fail: warn
  before_checkpoint:
    - run: "bun run lint --fix 2>/dev/null || true"
  after_checkpoint:
    - run: "git push origin HEAD"
      on_fail: pause
  on_stop:
    - run: "git push origin HEAD || true"
      on_fail: warn
    - run: "echo '✅ Jankurai master loop exited cleanly'"

tasks:
  ledger: sqlite
  discover:
    - command: "grep -nE '^- \\[ \\] ' JANKURAI_TASKLIST.md | head -50"
      timeout: 10s

on:
  - signal: no_progress
    count_gte: 2
    do:
      - incubate_current_task: true
      - notify: "Routing stuck task to incubator"
  - signal: checkpoint_failed
    do:
      - incubate_current_task: true
  - signal: error
    message_contains: "merge conflict"
    do:
      - pause: true
      - notify: "Merge conflict — human review required"

incubator:
  enabled: true
  strategy: generate_pool_strengthen
  route_when:
    any:
      - repeated_attempts_gte: 2
      - no_progress_iterations_gte: 2
      - risk_score_gte: 0.65
      - touches_paths:
          - "packages/opencode/src/session/**"
          - "packages/opencode/src/agent-script/**"
          - "packages/opencode/migration/**"
          - "packages/opencode/src/cli/cmd/tui/**"
          - "packages/opencode/src/auth/**"
  exclude_when:
    any:
      - readiness_score_lt: 0.20
      - touches_paths:
          - "docs/**"
          - "**/*.md"
  budget:
    max_passes_per_task: 6
    max_rounds_per_task: 2
    max_active_tasks: 1
    max_parallel_idea_passes: 3
  scratch:
    storage: sqlite
    mirror: true
    cleanup: summarize_and_archive
  cleanup:
    summarize_to_task_memory: true
    archive_artifacts: true
    delete_scratch: true
    delete_unmerged_worktrees: true
  readiness:
    promote_at: 0.78
    tests_identified_gte: 1
    scope_bounded_gte: 1
    plan_reviewed_gte: 1
    rollback_known_gte: 1
    affected_files_known_gte: 1
    critical_objections_resolved_gte: 1
    model_confidence_cap: 0.06
  passes:
    - { id: scout, type: scout, context: blind, writes: scratch_only }
    - { id: ideas, type: idea, context: blind, count: 3, writes: scratch_only }
    - { id: critic, type: critic, context: pool, writes: scratch_only }
    - { id: synth, type: synthesize, context: pool, writes: scratch_only }
    - { id: prototype, type: prototype, context: inherit, writes: isolated_worktree }
    - { id: review, type: promotion_review, context: promotion, writes: scratch_only }
  promotion:
    promote_at: 0.78
    require: [problem_statement, current_best_plan, verification_strategy, risk_review]
    block_on: { unresolved_critical_objections_gte: 1 }
    on_promote: move_to_ready_queue
    on_exhausted: park_with_summary

memory:
  stores:
    task_context:
      scope: task
      retention: until_promotion
      max_entries: 200
      write_policy: append_only
      read_policy: inject_at_start
    failed_approaches:
      scope: global
      retention: permanent
      write_policy: append_only
      read_policy: search
      searchable: true
    jankurai_findings:
      scope: run
      retention: session
      write_policy: upsert
      read_policy: inject_at_start
  redaction:
    patterns: ["sk-*", "AKIA*", "ghp_*", "github_pat_*"]
    action: mask
  provenance:
    track_source: true
    hash_chain: true

quality:
  anti_vibe:
    enabled: true
    fail_closed: true
    block_test_deletion: true
    block_assertion_weakening: true
    block_silent_catch: true
    block_fake_data_fallback: true
    block_ts_ignore: true
    require_root_cause_for_bugfix: true
    require_failing_test_first_for_bugfix: true
  diff_budget:
    max_files_changed: 25
    max_added_lines: 1500
    on_violation: require_approval
  checks:
    - name: no-test-skip
      pattern: "\\.skip\\(|test\\.only\\(|describe\\.only\\("
      scope: file_diff
      on_violation: block_promotion
    - name: no-broad-catch
      pattern: "catch\\s*\\([^)]*\\)\\s*\\{\\s*\\}"
      scope: file_diff
      on_violation: warn

capabilities:
  default: deny
  rules:
    - { id: read-anywhere, tool: read, decision: allow }
    - { id: edit-src, tool: edit, paths: ["packages/**/src/**", "packages/**/test/**"], decision: allow }
    - { id: edit-docs, tool: edit, paths: ["docs/**", "**/*.md"], decision: allow }
    - { id: edit-tasklist, tool: edit, paths: ["JANKURAI_TASKLIST.md", "JANKURAI_TASKLIST.md.completed"], decision: allow }
    - { id: edit-migrations, tool: edit, paths: ["**/migrations/**"], decision: ask, require_gate: dba_review }
    - id: shell-tests
      tool: shell
      command_regex: "^(bun (test|run lint|run build|run typecheck)|tsgo --noEmit|jankurai (audit|score)|jq |grep |sed |git (status|diff|log|fetch|rebase|push origin HEAD))( |$)"
      decision: allow
      expires: 4h
    - { id: git-commit, tool: git_commit, decision: allow }
    - { id: git-push, tool: git_push, decision: allow, reason: "explicit user objective" }
  command_floor:
    always_block:
      - "git push --force"
      - "git push -f"
      - "git reset --hard origin"
      - "rm -rf /"
      - "rm -rf .git"
      - "sudo "
      - "chmod 777"
      - "curl .* \\| sh"
      - "DROP DATABASE"
      - "DROP TABLE"

models:
  profiles:
    plan: { provider: jnoccio, model: jnoccio-fusion, reasoning: true }
    build: { provider: jnoccio, model: jnoccio-fusion }
    critic: { provider: jnoccio, model: jnoccio-fusion, reasoning: true }
    summarizer: { provider: jnoccio, model: jnoccio-fusion, budget_usd: 0.50 }
  routes:
    plan: plan
    implement: build
    review: critic
    compress: summarizer
  critic:
    must_differ_from_builder: false
    must_use_different_provider: false
  fallback:
    on_rate_limit: summarizer
    on_context_overflow: summarizer
    cooldown: 60s
  confidence_cap: 0.6

budgets:
  run:
    wall_clock: 720h
    cost_usd: 500.00
    on_exhaust: renew_with_approval
  task:
    iterations: 25
    cost_usd: 6.00
    on_exhaust: park
  iteration:
    tool_calls: 40
    diff_lines: 2000
    on_exhaust: pause

approvals:
  gates:
    dba_review:
      required_role: dba
      timeout: 24h
      on_timeout: pause
      decisions: [approve, reject, edit]

evidence:
  require_before_promote:
    - { type: test_results, must_pass: true }
    - { type: lint_results, must_pass: true }
    - { type: typecheck_results, must_pass: true }
    - { type: jankurai_delta, max_increase: 0 }
    - { type: rollback_plan, must_exist: true }
  bundle_format: json
  sign: sha256
  archive: true

rollback:
  required_when:
    risk_score_gte: 0.5
  plan_required: true
  verify_command: "git apply --reverse --check < .opencode/daemon/rollback.patch"
  on_failure_after_merge: revert_commit

done:
  require:
    - stop_conditions_met
    - jankurai_zero_findings
    - worktree_clean
    - head_pushed_to_origin
    - evidence_complete
  forbid:
    - model_only_claim
    - tests_not_run
    - tasklist_has_unresolved_open_items

checkpoint:
  when: after_verified_change
  noop_if_clean: true
  verify:
    - command: "bun test --timeout 60000"
      timeout: 120s
      assert: { exit_code: 0 }
    - command: "bun run lint 2>&1 | tail -1"
      timeout: 60s
      assert: { exit_code: 0 }
  git:
    add: ["."]
    commit_message: "jankurai: ${task.id} — ${task.summary}"
    push: allow

constraints:
  - name: jankurai-no-regression
    check:
      shell: "jankurai audit --json 2>/dev/null | jq '.findings | length' || echo 9999"
      timeout: 60s
    baseline: capture_on_start
    invariant: lte_baseline
    on_violation: pause
  - name: test-count-stable
    check:
      shell: "bun test --dry-run 2>&1 | grep -c test"
    baseline: capture_on_start
    invariant: gte_baseline
    on_violation: pause

observability:
  spans:
    emit: all
    include_tool_calls: true
    include_model_calls: true
  metrics:
    - { name: tasks_completed, type: counter, source: daemon }
    - { name: tasks_incubated, type: counter, source: daemon }
    - { name: jankurai_findings, type: gauge, source: shell }
    - { name: commits_pushed, type: counter, source: daemon }
    - { name: workers_active, type: gauge, source: fleet }
    - { name: total_tokens, type: counter, source: fleet }
  cost:
    budget: 500.00
    alert_at_percent: 80
    on_budget_exceeded: pause
  report:
    format: markdown
    on_complete: true
    on_checkpoint: true

ui:
  theme: opencode-gold
  banner: forever

permissions:
  shell: allow
  edit: allow
  git_commit: allow
  git_push: allow
  workers: ask
  mcp: ask
<<<END_ZYAL id=jankurai-master-loop>>>
ZYAL_ARM RUN_FOREVER id=jankurai-master-loop
