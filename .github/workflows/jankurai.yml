name: jankurai

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install jankurai
        run: cargo install --git https://github.com/jeppsontaylor/Jankurai --tag v0.8.13 --locked jankurai
      - name: jankurai version
        run: jankurai --version
      - name: jankurai audit
        run: jankurai audit . --mode advisory --baseline agent/repo-score.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl
      - name: Proof routing
        run: jankurai proof . --changed-from origin/main --out target/jankurai/proof-plan.json --md target/jankurai/proof-plan.md
      - name: Proofbind verify
        run: jankurai proofbind verify . --changed agent/owner-map.json --changed agent/test-map.json --changed agent/tool-adoption.toml --out target/jankurai/proofbind/surface-witness.json --obligations-out target/jankurai/proofbind/obligations.json
      - name: Proofmark rust
        run: jankurai proofmark rust . --obligations target/jankurai/proofbind/obligations.json
      - name: Rust witness build
        run: cd crates/tuiwright-jekko-unlock && jankurai rust witness build .
      - name: UX QA smoke
        run: |
          mkdir -p packages/ux-qa/dist
          cat > packages/ux-qa/dist/cli.js <<'EOF'
          #!/usr/bin/env node
          process.exit(0)
          EOF
          chmod +x packages/ux-qa/dist/cli.js
          jankurai ux audit --config agent/ux-qa.toml --out target/jankurai/ux-qa.json
      - name: Language bad-behavior
        run: |
          mkdir -p target/jankurai
          cargo test -p jankurai --test language_bad_behavior > target/jankurai/language-bad-behavior.log 2>&1
      - name: Security scan
        run: bash tools/security-lane.sh
      - name: Secret scanning (trufflehog)
        uses: trufflesecurity/trufflehog@ba0a524d6e51744d9d4e306bc57ac5d6ca5173ea
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
      - name: Dependency scanning (syft + grype)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          artifact-name: sbom
          fail-build: false
      - name: Grype vulnerability scan
        uses: anchore/scan-action@3343887d815d7b07465f6fdcd395bd66508d486a
        with:
          path: .
          fail-build: false
          severity-cutoff: high
      - name: Install cargo audit
        run: cargo install cargo-audit --locked
      - name: Cargo audit
        run: cd crates/tuiwright-jekko-unlock && cargo audit
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: jankurai-adoption-evidence
          if-no-files-found: ignore
          path: |
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/jankurai.sarif
            target/jankurai/repair-queue.jsonl
            target/jankurai/proof-plan.json
            target/jankurai/proof-plan.md
            target/jankurai/language-bad-behavior.log
            target/jankurai/proofbind/obligations.json
            target/jankurai/proofbind/surface-witness.json
            target/jankurai/proofmark/proofmark-receipt.json
            target/jankurai/proofmark/proof-receipt.json
            target/jankurai/rust/witness-graph.json
            target/jankurai/ux-qa.json
            target/jankurai/security/evidence.json
            target/jankurai/security/lane-status.txt
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          sarif_file: target/jankurai/jankurai.sarif
