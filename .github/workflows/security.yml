name: security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install jankurai
        run: cargo install --git https://github.com/neverhuman/jankurai --tag v1.0.0 --locked jankurai

      - name: Install gitleaks
        run: |
          go install github.com/gitleaks/gitleaks/v8@v8.24.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Jankurai security lane
        run: bash tools/security-lane.sh

      - name: Secret scanning (trufflehog)
        uses: trufflesecurity/trufflehog@ba0a524d6e51744d9d4e306bc57ac5d6ca5173ea
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Dependency scanning (syft + grype)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          artifact-name: sbom
          fail-build: false

      - name: Grype vulnerability scan
        uses: anchore/scan-action@3343887d815d7b07465f6fdcd395bd66508d486a
        with:
          path: .
          fail-build: false
          severity-cutoff: high

      - name: Install cargo audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cd crates/tuiwright-jekko-unlock && cargo audit
