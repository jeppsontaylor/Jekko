name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  push:
    branches:
      - ci
      - dev
      - beta
      - snapshot-*
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    if: github.repository == 'neverhuman/jekko'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          jekko-app-id: ${{ vars.JEKKO_APP_ID }}
          jekko-app-secret: ${{ secrets.JEKKO_APP_SECRET }}

      - name: Install Jekko
        if: inputs.bump || inputs.version
        run: bun i -g jekko-ai

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
          JEKKO_BUMP: ${{ inputs.bump }}
          JEKKO_VERSION: ${{ inputs.version }}
          JEKKO_API_KEY: ${{ secrets.JEKKO_API_KEY }}
          GH_REPO: ${{ (github.ref_name == 'beta' && 'neverhuman/jekko-beta') || github.repository }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      repo: ${{ steps.version.outputs.repo }}

  build-cli:
    needs: version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    if: github.repository == 'neverhuman/jekko'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          jekko-app-id: ${{ vars.JEKKO_APP_ID }}
          jekko-app-secret: ${{ secrets.JEKKO_APP_SECRET }}

      - name: Build
        id: build
        run: |
          ./packages/jekko/script/build.ts ${{ (github.ref_name == 'beta' && '--sourcemaps') || '' }}
        env:
          JEKKO_VERSION: ${{ needs.version.outputs.version }}
          JEKKO_RELEASE: ${{ needs.version.outputs.release }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          GH_TOKEN: ${{ steps.committer.outputs.token }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jekko-cli
          path: |
            packages/jekko/dist/jekko-darwin*
            packages/jekko/dist/jekko-linux*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jekko-cli-windows
          path: packages/jekko/dist/jekko-windows*
    outputs:
      version: ${{ needs.version.outputs.version }}

  sign-cli-windows:
    needs:
      - build-cli
      - version
    runs-on: blacksmith-4vcpu-windows-2025
    timeout-minutes: 30
    if: github.repository == 'neverhuman/jekko'
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/download-artifact@eaceaf801fd36c7dee90939fad912460b18a1ffe
        with:
          name: jekko-cli-windows
          path: packages/jekko/dist

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          jekko-app-id: ${{ vars.JEKKO_APP_ID }}
          jekko-app-secret: ${{ secrets.JEKKO_APP_SECRET }}

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/artifact-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16
        with:
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
          files: |
            ${{ github.workspace }}\packages\jekko\dist\jekko-windows-arm64\bin\jekko.exe
            ${{ github.workspace }}\packages\jekko\dist\jekko-windows-x64\bin\jekko.exe
            ${{ github.workspace }}\packages\jekko\dist\jekko-windows-x64-baseline\bin\jekko.exe
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Verify Windows CLI signatures
        shell: pwsh
        run: |
          $files = @(
            "${{ github.workspace }}\packages\jekko\dist\jekko-windows-arm64\bin\jekko.exe",
            "${{ github.workspace }}\packages\jekko\dist\jekko-windows-x64\bin\jekko.exe",
            "${{ github.workspace }}\packages\jekko\dist\jekko-windows-x64-baseline\bin\jekko.exe"
          )

          foreach ($file in $files) {
            $sig = Get-AuthenticodeSignature $file
            if ($sig.Status -ne "Valid") {
              throw "Invalid signature for ${file}: $($sig.Status)"
            }
          }

      - name: Repack Windows CLI archives
        working-directory: packages/jekko/dist
        shell: pwsh
        run: |
          Compress-Archive -Path "jekko-windows-arm64\bin\*" -DestinationPath "jekko-windows-arm64.zip" -Force
          Compress-Archive -Path "jekko-windows-x64\bin\*" -DestinationPath "jekko-windows-x64.zip" -Force
          Compress-Archive -Path "jekko-windows-x64-baseline\bin\*" -DestinationPath "jekko-windows-x64-baseline.zip" -Force

      - name: Upload signed Windows CLI release assets
        if: needs.version.outputs.release != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
        run: |
          gh release upload "v${{ needs.version.outputs.version }}" `
            "${{ github.workspace }}\packages\jekko\dist\jekko-windows-arm64.zip" `
            "${{ github.workspace }}\packages\jekko\dist\jekko-windows-x64.zip" `
            "${{ github.workspace }}\packages\jekko\dist\jekko-windows-x64-baseline.zip" `
            --repo "${{ needs.version.outputs.repo }}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jekko-cli-signed-windows
          path: |
            packages/jekko/dist/jekko-windows-arm64
            packages/jekko/dist/jekko-windows-x64
            packages/jekko/dist/jekko-windows-x64-baseline


  publish:
    needs:
      - version
      - build-cli
      - sign-cli-windows
    if: always() && !failure() && !cancelled()
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/setup-bun

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@eaceaf801fd36c7dee90939fad912460b18a1ffe
        with:
          name: jekko-cli
          path: packages/jekko/dist

      - uses: actions/download-artifact@eaceaf801fd36c7dee90939fad912460b18a1ffe
        with:
          name: jekko-cli-windows
          path: packages/jekko/dist

      - uses: actions/download-artifact@eaceaf801fd36c7dee90939fad912460b18a1ffe
        with:
          name: jekko-cli-signed-windows
          path: packages/jekko/dist


      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          jekko-app-id: ${{ vars.JEKKO_APP_ID }}
          jekko-app-secret: ${{ secrets.JEKKO_APP_SECRET }}

      - name: Cache apt packages (AUR)
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-aur-${{ hashFiles('.github/workflows/publish.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-aur-

      - name: Setup SSH for AUR
        env:
          AUR_SSH_KEY: ${{ runner.temp }}/aur-key
          GIT_SSH_COMMAND: ssh -i ${{ runner.temp }}/aur-key -o UserKnownHostsFile=${{ runner.temp }}/known_hosts -o IdentitiesOnly=yes
        run: |
          sudo apt-get update
          sudo apt-get install -y pacman-package-manager
          mkdir -p "$RUNNER_TEMP"
          printf '%s\n' "${{ secrets.AUR_KEY }}" > "$AUR_SSH_KEY"
          chmod 600 "$AUR_SSH_KEY"
          git config --global user.email "jekko@sst.dev"
          git config --global user.name "jekko"
          ssh-keyscan -H aur.archlinux.org >> "$RUNNER_TEMP/known_hosts" || true

      - run: ./script/publish.ts
        env:
          JEKKO_VERSION: ${{ needs.version.outputs.version }}
          JEKKO_RELEASE: ${{ needs.version.outputs.release }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GITHUB_TOKEN: ${{ steps.committer.outputs.token }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          NPM_CONFIG_PROVENANCE: false
