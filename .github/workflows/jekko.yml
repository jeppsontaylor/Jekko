name: jekko

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: jekko-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  jekko:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /jekko') ||
      startsWith(github.event.comment.body, '/jekko')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/setup-bun

      - name: Run jekko
        uses: anomalyco/jekko/github@v1.0.220
        env:
          JEKKO_API_KEY: ${{ secrets.JEKKO_API_KEY }}
          JEKKO_PERMISSION: '{"bash": "deny"}'
        with:
          model: jekko/claude-opus-4-5
