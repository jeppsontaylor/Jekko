version = 1

[[zones]]
path = "bun.lock"
policy = "mechanical"
reason = "Lock file managed exclusively by bun."

[[zones]]
path = "node_modules/**"
policy = "never-edit"
reason = "Dependencies installed by bun."

[[zones]]
path = "packages/**/node_modules/**"
policy = "never-edit"
reason = "Dependencies installed by bun."

[[zones]]
path = "packages/**/dist/**"
policy = "never-edit"
reason = "Build output directory."

[[zones]]
path = "packages/sdk/js/dist/**"
policy = "never-edit"
reason = "Generated SDK output. Regenerate via ./packages/sdk/js/script/build.ts"

[[zones]]
path = ".turbo/**"
policy = "never-edit"
reason = "Turbo cache directory."
