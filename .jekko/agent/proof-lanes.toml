version = 1

[lanes.fast]
description = "Required for ordinary TypeScript/JavaScript edits. Fast linting and typechecking."
commands = [
  "bun run lint",
  "bun typecheck"
]

[lanes.medium]
description = "PR-ready. Lints, typechecks, and package-local tests."
commands = [
  "bun run lint",
  "bun typecheck",
  "bun test" # To be executed in the modified package directory per AGENTS.md
]

[lanes.loc-check]
description = "File-size policy check if applicable."
commands = [
  "./script/check-loc-cap 800 --warn",
  "./script/check-loc-cap 2000 --error"
]
