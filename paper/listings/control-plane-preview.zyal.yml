# Provenance: compact appendix excerpt from docs/ZYAL/examples/09-control-plane-preview.zyal.yml.
<<<ZYAL v1:daemon id=control-plane-preview>>>
version: v1
intent: daemon
confirm: RUN_FOREVER
job:
  name: "Control-plane preview"
  objective: "Parse future host capabilities without pretending they are enforced."
stop:
  all:
    - shell: { command: "true", timeout: 1s, assert: { exit_code: 0 } }
runtime:
  mode: preview
  image: "ghcr.io/example/zyal-runtime:preview"
  workspace: isolated
  network: allowlist
capability_negotiation:
  host: jekko
  required: [preview, strict_schema, run_card]
  optional: [taint, evidence_graph, memory_kernel]
  fail_closed: true
memory_kernel:
  stores:
    run: { scope: run, retention: session, searchable: true }
    repo: { scope: repo, retention: permanent, searchable: true }
  redaction:
    patterns: ["sk-[A-Za-z0-9]+", "ghp_[A-Za-z0-9]+"]
    action: mask
  provenance:
    track_source: true
    hash_chain: true
trust:
  zones:
    trusted_repo:
      paths: ["src/**", "test/**"]
      taint: clean
    external_docs:
      paths: ["vendor/**"]
      taint: tainted
      require_approval: true
requirements:
  must: [fail_closed_when_required_feature_missing]
  should: [degrade_for_optional_features]
  avoid: [silent_feature_drop]
unsupported_feature_policy:
  required: [version, intent, confirm, job, stop, runtime]
  optional: [taint, trust, imports, reasoning_privacy]
  fail_closed: true
  on_missing: reject
<<<END_ZYAL id=control-plane-preview>>>
ZYAL_ARM RUN_FOREVER id=control-plane-preview
