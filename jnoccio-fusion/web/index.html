<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jnoccio Fusion — Real-time LLM model routing dashboard with live metrics, latency arena, and token tracking." />
    <title>Jnoccio Fusion Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; background: #0a0b0f; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #0a0b0f;
        transition: opacity 500ms ease, visibility 500ms ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      #splash img {
        max-width: min(90vw, 720px); max-height: 60vh;
        object-fit: contain;
        animation: splash-pulse 2s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.85; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.015); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/assets/jnoccio_header.png" alt="Jnoccio Fusion" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
