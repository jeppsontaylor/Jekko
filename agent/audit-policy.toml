minimum_score = 85
fail_on = ["critical", "high"]
advisory_on = ["medium", "low"]
cap_overrides = []

[history]
max_rows = 500
max_bytes = 1048576
dedupe = "consecutive-equivalent"
mirror_env = "JANKURAI_HISTORY_MIRROR"
mirror_required = false
mirror_max_rows = 5000

[scan]
excluded_paths = ["tips/", "apps/", "nix/", "packages/jekko/script/", "packages/sdk/js/src/gen/", "packages/sdk/js/src/v2/gen/", "jnoccio-fusion/src/", "jnoccio-fusion/tests/", "packages/jekko/src/acp/", "packages/jekko/src/agent-script/", "packages/jekko/src/cli/cmd/github.ts", "packages/jekko/src/cli/cmd/run.ts", "packages/jekko/src/cli/cmd/daemon.ts", "packages/jekko/src/cli/cmd/tui/component/logo.tsx", "packages/jekko/src/cli/cmd/tui/component/todo-item.tsx", "packages/jekko/src/cli/cmd/tui/component/task-item.tsx", "packages/jekko/src/cli/cmd/tui/context/sync-store.tsx", "packages/jekko/src/cli/cmd/tui/context/sync-legacy.tsx", "packages/jekko/src/cli/cmd/tui/context/theme.tsx", "packages/jekko/src/session/prompt.ts", "packages/jekko/src/cli/cmd/tui/context/zyal-flash.ts", "packages/jekko/src/cli/cmd/tui/context/jnoccio-ws.ts"]

