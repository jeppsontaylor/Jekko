minimum_score = 85
fail_on = ["critical", "high"]
advisory_on = ["medium", "low"]
cap_overrides = []

[history]
max_rows = 500
max_bytes = 1048576
dedupe = "consecutive-equivalent"
mirror_env = "JANKURAI_HISTORY_MIRROR"
mirror_required = false
mirror_max_rows = 5000

[scan]
excluded_paths = ["tips/", "apps/", "nix/", "packages/jekko/script/", "packages/sdk/js/src/gen/", "packages/sdk/js/src/v2/gen/", "jnoccio-fusion/src/", "jnoccio-fusion/tests/", "packages/jekko/src/acp/", "packages/jekko/src/agent-script/examples.ts", "packages/jekko/src/agent-script/parser.test.ts"]

[ux_surface]
path = "jnoccio-fusion/web"
label = "jnoccio-fusion dashboard"
lane = "ux-e2e"
