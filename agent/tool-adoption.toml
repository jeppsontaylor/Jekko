schema_version = "1.0.0"

[[tools]]
artifact_paths = [
    "agent/repo-score.json",
    "agent/repo-score.md",
    "target/jankurai/repo-score.json",
    "target/jankurai/repo-score.md",
    "target/jankurai/jankurai.sarif",
    "target/jankurai/summary.md",
    "target/jankurai/repair-queue.jsonl",
]
ci_command = "jankurai audit . --mode advisory --baseline agent/repo-score.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl"
id = "audit-ci"
local_command = "jankurai audit . --mode advisory --baseline agent/repo-score.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl"
mode = "auto"

[[tools]]
artifact_paths = [
    "target/jankurai/proof-plan.json",
    "target/jankurai/proof-plan.md",
]
ci_command = "jankurai proof . --changed-from origin/main --out target/jankurai/proof-plan.json --md target/jankurai/proof-plan.md"
id = "proof-routing"
local_command = "jankurai proof . --changed-from origin/main --out target/jankurai/proof-plan.json --md target/jankurai/proof-plan.md"
mode = "auto"

[[tools]]
artifact_paths = [
    "target/jankurai/security/evidence.json",
    "target/jankurai/security/lane-status.txt",
]
ci_command = "bash tools/security-lane.sh"
id = "security"
local_command = "bash tools/security-lane.sh"
mode = "auto"

[[tools]]
artifact_paths = [
    "target/jankurai/proofbind/surface-witness.json",
    "target/jankurai/proofbind/obligations.json",
]
ci_command = "jankurai proofbind verify . --changed agent/owner-map.json --changed agent/test-map.json --changed agent/tool-adoption.toml --out target/jankurai/proofbind/surface-witness.json --obligations-out target/jankurai/proofbind/obligations.json"
id = "proofbind"
local_command = "jankurai proofbind verify . --changed agent/owner-map.json --changed agent/test-map.json --changed agent/tool-adoption.toml --out target/jankurai/proofbind/surface-witness.json --obligations-out target/jankurai/proofbind/obligations.json"
mode = "auto"

[[tools]]
artifact_paths = ["target/jankurai/ux-qa.json"]
ci_command = "jankurai ux audit --config agent/ux-qa.toml --out target/jankurai/ux-qa.json"
id = "ux-qa"
local_command = "jankurai ux audit --config agent/ux-qa.toml --out target/jankurai/ux-qa.json"
mode = "auto"

[[tools]]
artifact_paths = ["target/jankurai/migration-report.json"]
ci_command = "jankurai migrate . --analyze --json target/jankurai/migration-report.json"
id = "db-migration-analyze"
local_command = "jankurai migrate . --analyze --json target/jankurai/migration-report.json"
mode = "auto"

[[tools]]
artifact_paths = [
    "agent/repo-score.json",
    "agent/repo-score.md",
    "target/jankurai/repo-score.json",
    "target/jankurai/repo-score.md",
    "target/jankurai/jankurai.sarif",
    "target/jankurai/summary.md",
    "target/jankurai/repair-queue.jsonl",
]
ci_command = "jankurai audit . --mode advisory --baseline agent/repo-score.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl"
id = "contract-drift"
local_command = "jankurai audit . --mode advisory --baseline agent/repo-score.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl"
mode = "auto"

[[tools]]
artifact_paths = ["target/jankurai/rust/witness-graph.json"]
ci_command = "jankurai rust witness build ."
id = "rust-witness"
local_command = "jankurai rust witness build ."
mode = "auto"

[[tools]]
artifact_paths = ["target/jankurai/language-bad-behavior.log"]
ci_command = "cargo test -p jankurai --test language_bad_behavior > target/jankurai/language-bad-behavior.log 2>&1"
id = "ci-bad-behavior"
local_command = "cargo test -p jankurai --test language_bad_behavior > target/jankurai/language-bad-behavior.log 2>&1"
mode = "auto"

[[tools]]
artifact_paths = ["target/jankurai/language-bad-behavior.log"]
ci_command = "cargo test -p jankurai --test language_bad_behavior > target/jankurai/language-bad-behavior.log 2>&1"
id = "git-bad-behavior"
local_command = "cargo test -p jankurai --test language_bad_behavior > target/jankurai/language-bad-behavior.log 2>&1"
mode = "auto"

[[tools]]
artifact_paths = ["target/jankurai/language-bad-behavior.log"]
ci_command = "cargo test -p jankurai --test language_bad_behavior > target/jankurai/language-bad-behavior.log 2>&1"
id = "release-bad-behavior"
local_command = "cargo test -p jankurai --test language_bad_behavior > target/jankurai/language-bad-behavior.log 2>&1"
mode = "auto"

