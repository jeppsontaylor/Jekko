[profiles.ci]
advisory_tools = [
    "gitleaks",
    "cargo-audit",
    "npm",
    "syft",
]
enabled_tools = [
    "gitleaks",
    "cargo-audit",
    "npm",
    "syft",
]
# gitleaks runs via `tools/security-lane.sh` (artifact at
# `target/jankurai/security/gitleaks.json`), but jankurai 1.0.0's
# `security run --strict --profile ci` wrapper synthesises its own command
# list and does not surface the script's gitleaks status as "ran" — leaving
# gitleaks marked "skipped" even though the binary executed. Until upstream
# preserves wrapper-script command evidence, we keep gitleaks as advisory
# in CI so `--strict` does not block. Secret scanning still runs via the
# trufflesecurity/trufflehog GitHub Action in `.github/workflows/jankurai.yml`.
required_tools = []

[profiles.local]
advisory_tools = [
    "gitleaks",
    "cargo-audit",
    "npm",
    "syft",
]
enabled_tools = [
    "gitleaks",
    "cargo-audit",
    "npm",
]
required_tools = []

[severity_thresholds]
fail_lane_on = "high"
